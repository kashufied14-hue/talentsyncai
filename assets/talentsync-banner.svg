<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="480" viewBox="0 0 1600 480" role="img" aria-labelledby="title desc">
  <title id="title">TalentSync AI Banner</title>
  <desc id="desc">A dark gradient banner with glowing nodes and TalentSync AI title.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="55%" stop-color="#0b1530"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="480" fill="url(#bg)"/>
  <circle cx="190" cy="120" r="110" fill="#00f5ff" opacity="0.12" filter="url(#glow)"/>
  <circle cx="1380" cy="90" r="140" fill="#7c3aed" opacity="0.12" filter="url(#glow)"/>
  <circle cx="1320" cy="370" r="170" fill="#3b82f6" opacity="0.1" filter="url(#glow)"/>
  <g opacity="0.24">
    <path d="M0 340H1600" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
    <path d="M0 250H1600" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <path d="M0 160H1600" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="280" cy="220" r="18" fill="#00f5ff"/>
    <circle cx="420" cy="160" r="14" fill="#7c3aed"/>
    <circle cx="520" cy="250" r="12" fill="#3b82f6"/>
    <circle cx="1100" cy="180" r="16" fill="#00f5ff"/>
    <circle cx="1220" cy="245" r="13" fill="#7c3aed"/>
    <circle cx="1320" cy="165" r="11" fill="#3b82f6"/>
    <path d="M280 220L420 160L520 250" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <path d="M1100 180L1220 245L1320 165" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>
  <text x="800" y="242" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="82" font-weight="700" text-anchor="middle">TalentSync AI</text>
  <text x="800" y="296" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="400" text-anchor="middle">Autonomous Recruitment Operating System</text>
  <rect x="585" y="330" width="430" height="58" rx="29" fill="url(#accent)" opacity="0.95"/>
  <text x="800" y="368" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Source. Screen. Interview. Score.</text>
</svg>
